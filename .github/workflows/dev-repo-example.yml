# ============================================================
# EXAMPLE ONLY — How this would look in a product/dev repository
# This file demonstrates CI gating pattern where:
# - Developers push application code
# - Automation tests run as a quality gate
# - PR cannot merge if tests fail
# ============================================================

name: Product CI Gate (Example)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    # Real scenario: dev opens PR to merge feature branch → tests run
    # If tests fail → PR is blocked from merging

jobs:
  # ── Job 1: Build and deploy the application ──────────────
  build-and-deploy:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Install app dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        # In real project: builds React/Node app

      - name: Deploy to test environment
        run: echo "Deploying to https://staging.app.com"
        # In real project: deploys to staging server
        # e.g. AWS, Vercel, Heroku etc

  # ── Job 2: Run automation tests against deployed app ─────
  # This job WAITS for build-and-deploy to succeed first
  e2e-tests:
    name: E2E Quality Gate
    runs-on: ubuntu-latest
    needs: build-and-deploy # ← only runs if build succeeds
    timeout-minutes: 15

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4
        with:
          repository: DChandra-arch/e2e-qa-poc # ← pulls YOUR automation repo
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install automation dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI smoke tests
        run: npx playwright test tests/webUI/todo.spec.ts --grep "@smoke"
        env:
          BASE_URL: https://staging.app.com # ← points to deployed app
          CI: true
        # Smoke tests run on every PR — fast feedback

      - name: Run API tests
        run: npx playwright test tests/api/todo.api.spec.ts
        env:
          API_URL: https://api.staging.app.com # ← staging API URL
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7

  # ── Job 3: Full regression — nightly only ────────────────
  nightly-regression:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    # Only runs on schedule — NOT on every PR
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4
        with:
          repository: DChandra-arch/e2e-qa-poc
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run full regression
        run: npx playwright test
        # Runs ALL tests — UI, API, mobile viewport
        env:
          BASE_URL: https://staging.app.com
          API_URL: https://api.staging.app.com
          CI: true

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: playwright-report/

# ── Scheduled triggers ──────────────────────────────────────
# Add to 'on:' section for nightly builds:
#
# schedule:
#   - cron: '0 2 * * *'   # 2am UTC every night — full regression
#   - cron: '0 8 * * 1'   # 8am UTC every Monday — weekly full suite

# on: push/pull_request — runs on every push to main and every PR
# runs-on: ubuntu-latest — GitHub's free Linux CI machine
# actions/checkout@v4 — downloads your code onto the CI machine
# actions/setup-node@v4 — installs Node 24 with npm cache for speed
# npm ci — clean install from lockfile — faster and safer than npm install in CI
# npx playwright install chromium --with-deps — installs browser + Linux dependencies needed in CI
# env: CI: true — triggers retries: 2 and workers: 2 from your config
# upload-artifact — saves the HTML report even if tests fail — if: always() ensures it runs regardless of test outcome

# ORDER MATTERS jobs - steps
# 1. Checkout      — get the code
# 2. Setup Node    — install runtime
# 3. npm ci        — install packages
# 4. Install browsers — download Chromium
# 5. tsc --noEmit  — catch type errors BEFORE running tests
# 6. Run UI tests  — only if types are clean
# 7. Run API tests — only if UI tests pass
# 8. Upload report — always, even on failure

name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run UI tests
        run: npx playwright test tests/webUI/todo.spec.ts
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          CI: true

      - name: Run API tests
        run: npx playwright test tests/api/todo.api.spec.ts
        env:
          API_URL: ${{ vars.API_URL }}
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
